name: Publish container

# Builds the Docker image and pushes it to GitHub Container Registry (GHCR) so
# it can be pulled and run with only Docker installed — no local Python/uv.
# This job also serves as the image's build check.
#
# After the first successful run, the package appears at
# https://github.com/<owner>/CoWastewaterBot/pkgs/container/cowastewaterbot
# It is private by default; make it public (package Settings -> Change visibility)
# or `docker login ghcr.io` to pull it.

on:
  push:
    branches:
      - main
      - claude/colorado-wastewater-ui-rpm3et
    paths:
      - "src/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for GHCR automatically.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
