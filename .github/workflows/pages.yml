name: Publish feed to Pages

# Publishes public/ (the Atom feed + landing page) to GitHub Pages.
# Scoped to main + manual so it doesn't run on feature branches. Requires Pages
# to be enabled for the repo (Settings -> Pages -> Source: GitHub Actions).

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
